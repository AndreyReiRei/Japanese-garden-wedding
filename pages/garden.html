<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=1050, user-scalable=no">
	<title>Японский сад — Красная нить</title>

	<link rel="stylesheet" href="../css/section.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">
</head>

<body class="section-garden">

	<!-- Индикатор загрузки -->
	<div class="loader-overlay" id="loader">
		<div class="loader-seal">
			<svg width="50" height="50" viewBox="0 0 50 50" fill="none">
				<circle cx="25" cy="25" r="22" stroke="#E84040" stroke-width="1.5" stroke-dasharray="8 4"
					class="loader-circle" />
				<text x="25" y="31" text-anchor="middle" fill="#E84040" font-family="'Noto Serif JP', serif"
					font-size="18">静</text>
			</svg>
		</div>
		<p class="loader-text">Загрузка...</p>
	</div>

	<!-- Шапка -->
	<div class="section-header">
		<a href="../index.html" class="back-btn">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
				<polyline points="15 18 9 12 15 6"></polyline>
			</svg>
			<span>Обложка</span>
		</a>
		<div class="section-title-group">
			<span class="section-subtitle-jp">日本庭園</span>
			<h1 class="section-title">Японский сад</h1>
		</div>
		<div class="page-indicator">
			<span id="currentPage">1</span>
			<span class="indicator-divider">/</span>
			<span id="totalPages">5</span>
		</div>
	</div>

	<!-- Viewport книги -->
	<div class="flipbook-viewport">
		<div class="container">
			<div class="flipbook" id="flipbook">
				<!-- Страница 1 — одиночная (открывает книгу) -->
				<div class="page" style="background-image:url(../photos/garden/garden-01.jpg)"></div>

				<!-- Разворот 2-3 — двойная страница -->
				<div class="double" style="background-image:url(../photos/garden/garden-02.jpg)"></div>

				<!-- Разворот 4-5 — двойная страница -->
				<div class="double" style="background-image:url(../photos/garden/garden-03.jpg)"></div>

				<!-- Разворот 6-7 — двойная страница -->
				<div class="double" style="background-image:url(../photos/garden/garden-04.jpg)"></div>

				<!-- Страница 8 — одиночная (закрывает книгу) -->
				<div class="page" style="background-image:url(../photos/garden/garden-05.jpg)"></div>
			</div>
		</div>
	</div>

	<!-- Нижняя навигация -->
	<nav class="section-nav">
		<span class="section-nav-item disabled">← Сад</span>
		<a href="zags.html" class="section-nav-item next">
			ЗАГС
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
				<polyline points="9 18 15 12 9 6"></polyline>
			</svg>
		</a>
	</nav>

	<!-- jQuery 1.7 (родная для Turn.js) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.7/jquery.min.js"></script>
	<!-- Modernizr (для проверки CSS transforms) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
	<!-- Скрипты -->
	<script src="../js/section.js"></script>
</body>

</html>
