<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Купеческий дом — Александр & Екатерина</title>
	<link rel="stylesheet" href="../css/gallery.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">
</head>

<body data-theme="home">

	<div class="bg-noise"></div>

	<!-- Шапка -->
	<header class="gallery-header">
		<div class="header-inner">
			<a href="../index.html" class="back-btn">
				<span class="back-arrow">←</span>
				<span>Обложка</span>
			</a>

			<div class="title-block">
				<h1 class="section-title">Купеческий дом</h1>

				<nav class="section-nav">
					<a href="zags.html" class="nav-arrow" title="Бракосочетание">←</a>

					<div class="section-dots">
						<a href="garden.html" class="section-dot" title="Японский сад"></a>
						<a href="zags.html" class="section-dot" title="Бракосочетание"></a>
						<span class="section-dot active" title="Купеческий дом"></span>
					</div>

					<!-- Последний раздел — стрелка скрыта -->
					<span class="nav-arrow disabled">→</span>
				</nav>
			</div>

			<span class="photo-counter" id="photoCounter"></span>
		</div>
	</header>

	<!-- Галерея -->
	<main class="gallery-container">
		<div class="gallery-grid" id="galleryGrid"></div>
	</main>

	<!-- Нижняя навигация -->
	<nav class="section-bottom-nav">
		<a href="zags.html" class="bottom-nav-btn">
			<span class="arrow arrow-left">←</span>
			<div class="bottom-nav-content">
				<span class="bottom-nav-label">Предыдущий раздел</span>
				<span class="bottom-nav-title">Бракосочетание</span>
			</div>
		</a>

		<a href="../index.html" class="bottom-nav-home">
			<span class="bottom-nav-home-icon">⟡</span>
			<span>Обложка</span>
		</a>

		<!-- Следующий раздел скрыт — последний -->
	</nav>

	<!-- Подвал -->
	<footer class="section-footer">
		<div class="footer-accent"></div>
		<p class="footer-text">Вечер. Родные лица. Тёплый свет старинного дома и смех до утра.</p>
	</footer>

	<!-- Лайтбокс -->
	<div class="lightbox" id="lightbox">
		<button class="lightbox-close" id="lightboxClose">✕</button>
		<button class="lightbox-nav prev" id="lightboxPrev">←</button>
		<img src="" alt="" id="lightboxImg">
		<button class="lightbox-nav next" id="lightboxNext">→</button>
		<span class="lightbox-counter" id="lightboxCounter"></span>
		<span class="lightbox-swipe-hint">← свайп →</span>
	</div>

	<script src="../js/gallery.js"></script>
	<script>
		// Инициализация галереи для раздела Дом
		initGallery( {
			section: 'home',
			photos: [
				// Замени на свои фото
				{ src: '../photos/home/01.jpg', alt: 'Интерьер дома', span: '2-cols' },
				{ src: '../photos/home/02.jpg', alt: 'Сервировка стола', span: '' },
				{ src: '../photos/home/03.jpg', alt: 'Детали декора', span: '2-rows' },
				{ src: '../photos/home/04.jpg', alt: 'Гости собираются', span: '' },
				{ src: '../photos/home/05.jpg', alt: 'Первый тост', span: '2-both' },
				{ src: '../photos/home/06.jpeg', alt: 'Бокалы', span: '' },
				{ src: '../photos/home/07.jpeg', alt: 'Родители', span: '2-rows' },
				{ src: '../photos/home/08.jpg', alt: 'Смех за столом', span: '2-cols' },
				{ src: '../photos/home/09.jpg', alt: 'Объятия с родными', span: '2-rows' },
				{ src: '../photos/home/10.jpeg', alt: 'Друзья', span: '' },
				{ src: '../photos/home/11.jpeg', alt: 'Общее фото', span: '2-both' },
				{ src: '../photos/home/12.jpeg', alt: 'Финальный кадр', span: '2-rows' },
			]
		} );
	</script>
</body>

</html>
