<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Купеческий дом — Александр & Екатерина</title>
	<link rel="stylesheet" href="../css/gallery.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">
</head>

<body data-theme="home">

	<!-- Фоновый шум -->
	<div class="bg-noise"></div>

	<!-- Шапка -->
	<header class="gallery-header">
		<div class="header-inner">
			<button class="back-btn" onclick="history.back()">
				<span class="back-arrow">←</span>
				<span>Назад</span>
			</button>

			<div class="title-block">
				<div class="section-title-jp">家族</div>
				<h1 class="section-title">Купеческий дом</h1>
			</div>

			<span class="photo-counter" id="photoCounter"></span>
		</div>
	</header>

	<!-- Галерея -->
	<main class="gallery-container">
		<div class="gallery-grid" id="galleryGrid">
			<!-- Фото добавятся через JS -->
		</div>
	</main>

	<!-- Подвал -->
	<footer class="section-footer">
		<div class="footer-seal"><span>和</span></div>
		<p class="footer-text">Вечер. Родные лица. Тёплый свет старинного дома и смех до утра.</p>
	</footer>

	<!-- Лайтбокс -->
	<div class="lightbox" id="lightbox">
		<button class="lightbox-close" id="lightboxClose">✕</button>
		<button class="lightbox-nav prev" id="lightboxPrev">←</button>
		<img src="" alt="" id="lightboxImg">
		<button class="lightbox-nav next" id="lightboxNext">→</button>
		<span class="lightbox-counter" id="lightboxCounter"></span>
		<span class="lightbox-swipe-hint">← свайп →</span>
	</div>

	<script src="../js/gallery.js"></script>
	<script>
		// Инициализация галереи для раздела Дом
		initGallery( {
			section: 'home',
			photos: [
				// Замени на свои фото
				{ src: '../photos/home/01.jpg', alt: 'Интерьер дома', span: '2-cols' },
				{ src: '../photos/home/02.jpg', alt: 'Сервировка стола', span: '' },
				{ src: '../photos/home/03.jpg', alt: 'Детали декора', span: '2-rows' },
				{ src: '../photos/home/04.jpg', alt: 'Гости собираются', span: '' },
				{ src: '../photos/home/05.jpg', alt: 'Первый тост', span: '2-both' },
				{ src: '../photos/home/06.jpeg', alt: 'Бокалы', span: '' },
				{ src: '../photos/home/07.jpeg', alt: 'Родители', span: '2-rows' },
				{ src: '../photos/home/08.jpg', alt: 'Смех за столом', span: '2-cols' },
				{ src: '../photos/home/09.jpg', alt: 'Объятия с родными', span: '2-rows' },
				{ src: '../photos/home/10.jpeg', alt: 'Друзья', span: '' },
				{ src: '../photos/home/11.jpeg', alt: 'Общее фото', span: '2-both' },
				{ src: '../photos/home/12.jpeg', alt: 'Финальный кадр', span: '2-rows' },
			]
		} );
	</script>
</body>

</html>
