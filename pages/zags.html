<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Бракосочетание — Александр & Екатерина</title>
	<link rel="stylesheet" href="../css/gallery.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">
</head>

<body data-theme="zags">

	<div class="bg-noise"></div>

	<!-- Шапка -->
	<header class="gallery-header">
		<div class="header-inner">
			<a href="../index.html" class="back-btn">
				<span class="back-arrow">←</span>
				<span>Назад</span>
			</a>

			<div class="title-block">
				<div class="section-title-jp">婚姻</div>
				<h1 class="section-title">Бракосочетание</h1>

				<!-- Навигация -->
				<nav class="section-nav">
					<!-- Предыдущий -->
					<a href="garden.html" class="nav-arrow" title="Японский сад">←</a>

					<!-- Точки -->
					<div class="section-dots">
						<a href="garden.html" class="section-dot" title="Японский сад"></a>
						<span class="section-dot active" title="Бракосочетание"></span>
						<a href="home.html" class="section-dot" title="Купеческий дом"></a>
					</div>

					<!-- Следующий -->
					<a href="home.html" class="nav-arrow" title="Купеческий дом">→</a>
				</nav>
			</div>

			<span class="photo-counter" id="photoCounter"></span>
		</div>
	</header>

	<!-- Галерея -->
	<main class="gallery-container">
		<div class="gallery-grid" id="galleryGrid"></div>
	</main>

	<!-- Нижняя навигация -->
	<nav class="section-bottom-nav">
		<a href="garden.html" class="bottom-nav-btn">
			<span class="arrow arrow-left">←</span>
			<div>
				<div class="bottom-nav-label">Предыдущий</div>
				<div class="bottom-nav-title">Японский сад</div>
			</div>
		</a>

		<div class="bottom-nav-divider"></div>

		<a href="../index.html" class="bottom-nav-home">
			<span class="bottom-nav-home-icon">🏠</span>
			<span>Домой</span>
		</a>

		<div class="bottom-nav-divider"></div>

		<a href="home.html" class="bottom-nav-btn">
			<div>
				<div class="bottom-nav-label">Следующий</div>
				<div class="bottom-nav-title">Купеческий дом</div>
			</div>
			<span class="arrow arrow-right">→</span>
		</a>
	</nav>

	<!-- Подвал -->
	<footer class="section-footer">
		<div class="footer-seal"><span>絆</span></div>
		<p class="footer-text">Кольца, подписи, клятвы. Момент, когда две жизни становятся одной.</p>
	</footer>

	<!-- Лайтбокс -->
	<div class="lightbox" id="lightbox">
		<button class="lightbox-close" id="lightboxClose">✕</button>
		<button class="lightbox-nav prev" id="lightboxPrev">←</button>
		<img src="" alt="" id="lightboxImg">
		<button class="lightbox-nav next" id="lightboxNext">→</button>
		<span class="lightbox-counter" id="lightboxCounter"></span>
		<span class="lightbox-swipe-hint">← свайп →</span>
	</div>

	<script src="../js/gallery.js"></script>
	<script>
		// Инициализация галереи для раздела ЗАГС
		initGallery( {
			section: 'zags',
			photos: [
				// Замени на свои фото
				{ src: '../photos/zags/01.jpeg', alt: 'Здание ЗАГСа', span: '2-cols' },
				{ src: '../photos/zags/02.jpeg', alt: 'Ожидание', span: '2-rows' },
				{ src: '../photos/zags/03.jpeg', alt: 'Роспись в книге', span: '' },
				{ src: '../photos/zags/04.jpeg', alt: 'Крупно руки', span: '2-rows' },
				{ src: '../photos/zags/05.jpg', alt: 'Обмен кольцами', span: '2-both' },
				{ src: '../photos/zags/06.jpg', alt: 'Кольца макро', span: '' },
				{ src: '../photos/zags/07.jpg', alt: 'Первый поцелуй', span: '2-rows' },
				{ src: '../photos/zags/08.jpg', alt: 'Свидетельство', span: '' },
				{ src: '../photos/zags/09.jpg', alt: 'Выход из ЗАГСа', span: '2-cols' },
				{ src: '../photos/zags/10.jpeg', alt: 'Поздравления', span: '' },
				{ src: '../photos/zags/11.jpeg', alt: 'Объятия', span: '2-rows' },
				{ src: '../photos/zags/12.jpeg', alt: 'Общее фото', span: '2-both' },
			]
		} );
	</script>
</body>

</html>
