<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Тест свитка</title>

	<!-- Только scroll.css -->
	<link rel="stylesheet" href="css/scroll.css">

	<style>
		/* Минимальные стили для теста */
		body {
			margin: 0;
			padding: 20px;
			background: #060606;
			color: #fff;
			font-family: 'Cormorant Garamond', serif;
			min-height: 100vh;
		}

		h1 {
			cursor: pointer;
			text-align: center;
			margin-top: 40px;
		}

		h1:hover {
			color: #E84040;
		}
	</style>
</head>

<body>

	<h1 class="section-title">Японский сад — нажми меня</h1>
	<p style="text-align:center;color:#888;">Тапни по заголовку чтобы открыть свиток</p>

	<!-- Свиток -->
	<div class="scroll-overlay" id="scrollOverlay">
		<div class="scroll-wrapper">
			<div class="scroll-paper">

				<div class="scroll-seal-top">
					<svg width="36" height="36" viewBox="0 0 36 36" fill="none">
						<circle cx="18" cy="18" r="16" stroke="#C0392B" stroke-width="1.2" />
						<text x="18" y="23" text-anchor="middle" fill="#C0392B" font-family="serif"
							font-size="14">記</text>
					</svg>
				</div>

				<h2 class="scroll-title">Заголовок загрузится из JS</h2>

				<div class="scroll-divider">
					<span class="scroll-divider-line"></span>
					<span class="scroll-divider-diamond">◆</span>
					<span class="scroll-divider-line"></span>
				</div>

				<div class="scroll-text">Текст загрузится из JS</div>

				<div class="scroll-seal-bottom">
					<svg width="40" height="40" viewBox="0 0 44 44" fill="none">
						<circle cx="22" cy="22" r="20" stroke="#C0392B" stroke-width="1.5" />
						<text x="22" y="28" text-anchor="middle" fill="#C0392B" font-family="serif"
							font-size="18">結</text>
					</svg>
				</div>

			</div>
		</div>

		<button class="scroll-close" id="scrollClose">✕</button>

		<div class="scroll-swipe-hint">
			<span class="scroll-swipe-line"></span>
		</div>
	</div>

	<script src="js/scroll.js"></script>
	<script>
		initScroll( {
			stories: {
				garden: {
					title: 'Японский сад',
					text: 'Утро началось с тишины. Камни, вода, изогнутые мостики и вековые деревья парка стали свидетелями первых кадров этого дня. Воздух был наполнен спокойствием.'
				}
			},
			section: 'garden',
			triggerSelector: '.section-title'
		} );
	</script>

</body>

</html>
