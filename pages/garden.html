<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Японский сад — Александр & Екатерина</title>
	<link rel="stylesheet" href="../css/gallery.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
		rel="stylesheet">
</head>

<body data-theme="garden">

	<!-- Фоновый шум -->
	<div class="bg-noise"></div>

	<!-- Шапка -->
	<header class="gallery-header">
		<div class="header-inner">
			<button class="back-btn" onclick="history.back()">
				<span class="back-arrow">←</span>
				<span>Назад</span>
			</button>

			<div class="title-block">
				<div class="section-title-jp">日本庭園</div>
				<h1 class="section-title">Японский сад</h1>
			</div>

			<span class="photo-counter" id="photoCounter"></span>
		</div>
	</header>

	<!-- Галерея -->
	<main class="gallery-container">
		<div class="gallery-grid" id="galleryGrid">
			<!-- Фото добавятся через JS -->
		</div>
	</main>

	<!-- Подвал -->
	<footer class="section-footer">
		<div class="footer-seal"><span>静</span></div>
		<p class="footer-text">Тишина, которую слышно только вдвоём</p>
	</footer>

	<!-- Лайтбокс -->
	<div class="lightbox" id="lightbox">
		<button class="lightbox-close" id="lightboxClose">✕</button>
		<button class="lightbox-nav prev" id="lightboxPrev">←</button>
		<img src="" alt="" id="lightboxImg">
		<button class="lightbox-nav next" id="lightboxNext">→</button>
		<span class="lightbox-counter" id="lightboxCounter"></span>
		<span class="lightbox-swipe-hint">← свайп →</span>
	</div>

	<script src="../js/gallery.js"></script>
	<script>
		// Инициализация галереи для раздела Сад
		initGallery( {
			section: 'garden',
			photos: [
				// Замени на свои фото
				{ src: '../photos/garden/01.jpeg', alt: 'Вход в сад', span: '2-rows' },
				{ src: '../photos/garden/02.jpeg', alt: 'Каменная дорожка', span: '' },
				{ src: '../photos/garden/03.jpg', alt: 'Мостик', span: '2-cols' },
				{ src: '../photos/garden/04.jpeg', alt: 'Пара у пруда', span: '2-rows' },
				{ src: '../photos/garden/05.jpeg', alt: 'Детали', span: '' },
				{ src: '../photos/garden/06.jpg', alt: 'Ветка сакуры', span: '' },
				{ src: '../photos/garden/07.jpeg', alt: 'Камни', span: '2-rows' },
				{ src: '../photos/garden/08.jpg', alt: 'Фонарь', span: '' },
				{ src: '../photos/garden/09.jpg', alt: 'Общий план', span: '2-both' },
				{ src: '../photos/garden/10.jpeg', alt: 'Портрет', span: '2-rows' },
				{ src: '../photos/garden/11.jpeg', alt: 'Руки', span: '' },
				{ src: '../photos/garden/12.jpeg', alt: 'Уход', span: '2-cols' },
			]
		} );
	</script>
</body>

</html>
