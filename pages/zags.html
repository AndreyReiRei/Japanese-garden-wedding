<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Бракосочетание — Андрей & Татьяна</title>

	<!-- Галерея -->
	<link rel="stylesheet" href="../css/gallery.css">
	<!-- Свиток -->
	<link rel="stylesheet" href="../css/scroll.css">
	<!-- Swiper -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
	<!-- Наш слайдер -->
	<link rel="stylesheet" href="../css/slider.css">

	<!-- Гугл шрифты -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Noto+Serif+JP:wght@200;300;400;500;600&family=Zen+Old+Mincho:wght@400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body data-theme="zags">

	<div class="bg-noise"></div>

	<!-- Шапка -->
	<header class="gallery-header">
		<div class="header-inner">
			<a href="../index.html" class="back-btn">
				<span class="btn-line"></span>
				<span class="btn-line"></span>
				<span class="btn-line"></span>
				<span class="btn-line"></span>
				<span class="back-arrow">←</span>
				<span>Главная</span>
			</a>

			<div class="title-block">
				<h1 class="section-title">Бракосочетание</h1>
			</div>

			<span class="photo-counter" id="photoCounter"></span>
		</div>
	</header>

	<!-- БЛОК СВИТКА -->
	<div class="scroll-block" id="scrollBlock">

		<div class="scroll-trigger" id="scrollTrigger">
			<div class="scroll-trigger-inner">
				<span class="scroll-trigger-text">История этого дня</span>
			</div>
		</div>

		<div class="scroll-expanded" id="scrollExpanded">
			<div class="scroll-paper">

				<div class="scroll-seal-top">
					<svg width="36" height="36" viewBox="0 0 36 36" fill="none">
						<circle cx="18" cy="18" r="16" stroke="var(--accent-color)" stroke-width="1.2" />
						<text x="18" y="23" text-anchor="middle" fill="var(--accent-color)"
							font-family="'Zen Old Mincho', serif" font-size="14">記</text>
					</svg>
				</div>

				<h2 class="scroll-title"></h2>

				<div class="scroll-divider">
					<span class="scroll-divider-line"></span>
					<span class="scroll-divider-diamond">◆</span>
					<span class="scroll-divider-line"></span>
				</div>

				<div class="scroll-text"></div>

				<div class="scroll-seal-bottom">
					<svg width="40" height="40" viewBox="0 0 44 44" fill="none">
						<circle cx="22" cy="22" r="20" stroke="var(--accent-color)" stroke-width="1.5" />
						<circle cx="22" cy="22" r="15" stroke="var(--accent-color)" stroke-width="0.5"
							stroke-dasharray="2 3" />
						<text x="22" y="28" text-anchor="middle" fill="var(--accent-color)"
							font-family="'Zen Old Mincho', serif" font-size="18">結</text>
					</svg>
				</div>

				<button class="scroll-collapse-btn" id="scrollCollapseBtn">
					<span>Свернуть</span>
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="1.5">
						<polyline points="18 15 12 9 6 15"></polyline>
					</svg>
				</button>

			</div>
		</div>

	</div>

	<!-- Галерея -->
	<main class="gallery-container">
		<div class="gallery-grid" id="galleryGrid"></div>
	</main>

	<!-- Нижняя навигация -->
	<nav class="section-bottom-nav">
		<a href="garden.html" class="animated-btn bottom-nav-prev-btn">
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="arrow arrow-left">←</span>
			<span class="bottom-nav-content">
				<span class="bottom-nav-label">Предыдущий</span>
				<span class="bottom-nav-title">Японский сад</span>
			</span>
		</a>

		<a href="../index.html" class="animated-btn bottom-nav-home-btn">
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="bottom-nav-home-icon">⟡</span>
			<span>Главная</span>
		</a>

		<a href="home.html" class="animated-btn bottom-nav-next-btn">
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="btn-line"></span>
			<span class="bottom-nav-content">
				<span class="bottom-nav-label">Следующий</span>
				<span class="bottom-nav-title">Купеческий дом</span>
			</span>
			<span class="arrow arrow-right">→</span>
		</a>
	</nav>

	<!-- Подвал -->
	<footer class="section-footer">
		<div class="footer-accent"></div>
		<p class="footer-text">Кольца, подписи, клятвы. Момент, когда две жизни становятся одной.</p>
	</footer>

	<!-- Swiper JS -->
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
	<!-- Наш слайдер -->
	<script src="../js/slider.js"></script>
	<!-- Свиток -->
	<script src="../js/scroll.js"></script>
	<!-- Галерея -->
	<script src="../js/gallery.js"></script>
	<!-- Эффекты -->
	<script src="../js/effects.js"></script>

	<script>
		// Истории для свитка
		const STORIES = {
			garden: {
				title: 'Японский сад',
				text: 'Утро началось с тишины. Камни, вода, изогнутые мостики и вековые деревья парка Галицкого стали свидетелями первых кадров этого дня. Воздух был наполнен спокойствием, а каждый шаг по дорожке сада отзывался в сердце предвкушением.'
			},
			zags: {
				title: 'Бракосочетание',
				text: 'Торжественный зал, мерцание люстр, шёпот гостей. Ручка скользнула по бумаге, оставляя росчерк, который изменил всё. Кольца вспыхнули в свете ламп, и мир на мгновение замер. «Да» прозвучало одновременно — тихо, но уверенно. Первый поцелуй как муж и жена. Аплодисменты. Конфетти. Слёзы радости на глазах мамы. Этот момент останется в памяти навсегда — день, когда две жизни стали одной.'
			},
			home: {
				title: 'Купеческий дом',
				text: 'Вечер опустился на старинный купеческий дом, зажигая свечи и наполняя комнаты теплом. Родные лица вокруг длинного стола, звон бокалов, смех и бесконечные истории.'
			}
		};

		// Инициализация свитка
		initScroll( {
			stories: STORIES,
			section: 'zags'
		} );

		// Инициализация галереи
		initGallery( {
			section: 'zags',
			photos: [
				{ src: '../photos/zags/01.jpeg', alt: 'Здание ЗАГСа', span: '2-cols' },
				{ src: '../photos/zags/02.jpeg', alt: 'Ожидание', span: '2-rows' },
				{ src: '../photos/zags/03.jpeg', alt: 'Роспись в книге', span: '' },
				{ src: '../photos/zags/04.jpeg', alt: 'Крупно руки', span: '2-rows' },
				{ src: '../photos/zags/05.jpg', alt: 'Обмен кольцами', span: '2-both' },
				{ src: '../photos/zags/06.jpg', alt: 'Кольца макро', span: '' },
				{ src: '../photos/zags/07.jpg', alt: 'Первый поцелуй', span: '2-rows' },
				{ src: '../photos/zags/08.jpg', alt: 'Свидетельство', span: '' },
				{ src: '../photos/zags/09.jpg', alt: 'Выход из ЗАГСа', span: '2-cols' },
				{ src: '../photos/zags/10.jpeg', alt: 'Поздравления', span: '' },
				{ src: '../photos/zags/11.jpeg', alt: 'Объятия', span: '2-rows' },
				{ src: '../photos/zags/12.jpeg', alt: 'Общее фото', span: '2-both' },
			]
		} );
	</script>
</body>

</html>
